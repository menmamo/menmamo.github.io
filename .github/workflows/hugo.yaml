name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: false

      - name: Build with Hugo
        env:
          HUGO_PARAMS_SEARCH_ALGOLIA_SEARCHKEY: ${{ vars.HUGO_SEARCH_KEY }}
        run: hugo --minify
      
      - name: Push index to Algolia
        run: |
          curl -X POST \
            -H "X-Algolia-API-Key: ${{ secrets.ALGOLIA_ADMIN_KEY }}" \
            -H "X-Algolia-Application-Id: ${{ vars.ALGOLIA_APP_ID }}" \
            --data-binary "@public/index.json" \
            "https://${{ vars.ALGOLIA_APP_ID }}.algolia.net/1/indexes/${{ vars.ALGOLIA_INDEX_NAME }}/batch"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4