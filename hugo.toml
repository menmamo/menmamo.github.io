baseURL = 'https://menma.top/'
languageCode = 'zh-CN'
title = 'MenmaTop'
theme = 'LoveIt'
languageName = "简体中文"
ignoreErrors = ["error-remote-getjson", "error-missing-instagram-accesstoken"]
# 分页配置
[pagination]
  disableAliases = false
  pagerSize = 20
  path = "page"
#菜单配置
[menu]
  [[menu.main]]
    weight = 1
    identifier = "posts"
    pre = ""
    post = ""
    name = "所有文章"
    url = "/posts/"
    title = ""
  [[menu.main]]
    weight = 2
    identifier = "tags"
    pre = ""
    post = ""
    name = "标签"
    url = "/tags/"
    title = ""
  [[menu.main]]
    weight = 3
    identifier = "categories"
    pre = ""
    post = ""
    name = "分类"
    url = "/categories/"
    title = ""
[params]
  defaultTheme = "auto"
  title = "MenmaTop"
  images = ["/info/favicon/favicon.svg"]
    [params.author]
        name = "mona"
        email = ""
        link = "https://menma.top"
    [params.header]
        desktopMode = "fixed"
        mobileMode = "auto"
        [params.header.title]
            logo = "/info/favicon/favicon.svg"
            name = "MenmaTop"
    [params.footer]
        enable = true
        hugo = false
        copyright = false
        author = false
    [params.section]
        paginate = 20
        rss = 10
    [params.list]
        paginate = 20
        rss = 10
    [params.app]
        title = "MenmaTop"
        noFavicon = false
        svgFavicon = "/info/favicon/favicon.svg"
        # Android 浏览器主题色
        themeColor = "#ffffff"
        # Safari 图标颜色
        iconColor = "#5bbad5"
        # Windows v8-10磁贴颜色
        tileColor = "#da532c"
    # 搜索配置
    [params.search]
        enable = true
        type = "algolia"
        contentLength = 4000
        placeholder = ""
        maxResultLength = 10
        snippetLength = 50
        highlightTag = "em"
        absoluteURL = false
        [params.search.algolia]
            index = ""
            appID = ""
            searchKey = ""
    #主页配置
    [params.home]
        rss = 10
        [params.home.profile]
            enable = false
        [params.home.posts]
            enable = true
            paginate = 20
    [params.page]
        [params.page.code]
            copy = true
            maxShownLines = 100
        [params.page.math]
            enable = true
        [params.page.share]
            enable = false
    [params.analytics]
         enable = false
[markup]
  [markup.highlight]
  noClasses = false
    [markup.goldmark]
      [markup.goldmark.renderer]
        unsafe = true
      [markup.goldmark.extensions]
        [markup.goldmark.extensions.passthrough]
            enable = true
            [markup.goldmark.extensions.passthrough.delimiters]
            block = [['$$', '$$'], ['\[', '\]']]
            inline = [['$', '$'], ['\(', '\)']]
[outputs]
    home = ["HTML", "RSS", "JSON"]
    page = ["HTML"]
    section = ["HTML", "RSS"]
    taxonomy = ["HTML", "RSS"]